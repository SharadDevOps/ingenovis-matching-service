apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-service
  namespace: matching-service
  labels:
    app: matching-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matching-service
  template:
    metadata:
      labels:
        app: matching-service
    spec:
      containers:
      - name: matching-service
        image: acringtrustaffdev.azurecr.io/matching-service:55c7296c6309b72180cf664517385ebdb38c23af
        ports:
        - containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: "dev"
        - name: BRAND
          value: "trustaff"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"